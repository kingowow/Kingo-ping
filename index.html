<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تأیید ایمیل</title>
<style>
  body {
    font-family: Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f0f4f8;
    margin: 0;
    padding: 0;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }

  .container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
    max-width: 400px;
    width: 90%;
  }

  h1 {
    color: #4CAF50;
    margin-bottom: 20px;
  }

  p {
    font-size: 18px;
    color: #333;
  }

  /* دکمه تایید مجدد (اختیاری) */
  .button {
    display: inline-block;
    margin-top: 30px;
    padding: 12px 24px;
    font-size: 16px;
    color: #ffffff;
    background-color: #4CAF50;
    border: none;
    border-radius: 5px;
    text-decoration: none;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  .button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>ایمیل شما تأیید شد</h1>
    <p>با تشکر از تأیید ایمیل شما. حساب کاربری شما فعال شده است.</p>
    <!-- در صورت نیاز، می‌توانید دکمه‌ای برای ادامه قرار دهید -->
    <!-- <a href="#" class="button">ادامه</a> -->
  </div>
</body>
</html>
